backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://beefnews.org
display_url: https://beefnews.org

collections:
  # ── News Articles ──────────────────────────────────────────────────────────
  - name: "news"
    label: "News Articles"
    label_singular: "Article"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "BeefNews Staff" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentence summary shown in cards and meta tags" }
      - { label: "Hero Image URL", name: "image", widget: "string", required: false, hint: "Full URL or /images/uploads/filename.jpg" }
      - { label: "Image Alt Text", name: "imageAlt", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Industry", "Markets", "Policy", "Science", "Rancher Spotlight", "Platform", "Opinion"]
      - { label: "Tags", name: "tags", widget: "list", default: [], hint: "Comma-separated: grass-fed, policy, markets" }
      - { label: "Featured Story", name: "featured", widget: "boolean", default: false, hint: "Appears in the hero slot on the homepage" }
      - { label: "Sponsored Content", name: "sponsored", widget: "boolean", default: false }
      - { label: "Sponsor Name", name: "sponsorName", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Radar (short-form intelligence) ───────────────────────────────────────
  - name: "radar"
    label: "Beef News Radar"
    label_singular: "Radar Item"
    folder: "src/content/radar"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Headline", name: "title", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "Beef News Radar" }
      - { label: "Summary", name: "excerpt", widget: "text", hint: "2-3 sentences — this is the full copy for Radar cards" }
      - { label: "Thumbnail URL", name: "image", widget: "string", required: false }
      - { label: "Image Alt Text", name: "imageAlt", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Industry Radar", "Market Signal", "Policy Watch", "Climate", "Platform", "International"]
        default: "Industry Radar"
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "External Link (optional)", name: "externalUrl", widget: "string", required: false, hint: "If set, the radar card links here instead of a detail page" }
      - { label: "Body", name: "body", widget: "markdown" }
