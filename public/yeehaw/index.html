<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beef News — Content Manager</title>

  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- React must be loaded BEFORE Decap CMS so Decap uses this instance -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Marked — markdown → HTML for the preview pane -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <!-- Twitter embed widgets (loaded async, used in preview pane) -->
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</head>
<body>
  <!-- Decap CMS (uses window.React loaded above) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    /* ── BeefNews CMS Preview Templates ──────────────────────────────────────── */

    // Apply dark-theme CSS to the live preview pane
    CMS.registerPreviewStyle('/yeehaw/custom.css');
    CMS.registerPreviewStyle('/yeehaw/preview.css');

    var h         = React.createElement;
    var useState  = React.useState;
    var useEffect = React.useEffect;
    var useRef    = React.useRef;

    var TWEET_RE = /^https?:\/\/(www\.)?(twitter\.com|x\.com)\/.+\/status\/\d+/i;

    /* ── URL detection & HTML transforms ──────────────────────────────────── */

    function tweetEmbedHtml(url) {
      return '<div class="embed-tweet">' +
        '<blockquote class="twitter-tweet" data-theme="dark" data-dnt="true">' +
        '<a href="' + url + '">Loading tweet…</a></blockquote></div>';
    }

    function linkPlaceholderHtml(url) {
      var domain = url;
      try { domain = new URL(url).hostname.replace(/^www\./, ''); } catch(e) {}
      return '<div class="link-card-placeholder" data-url="' + url + '">' +
        '<a href="' + url + '" target="_blank" class="preview-link-card">' +
        '<span class="link-icon">🔗</span>' +
        '<span class="link-url">' + domain + '</span>' +
        '</a></div>';
    }

    function ogCardHtml(og) {
      var esc = function(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      };
      return '<a href="' + esc(og.url) + '" target="_blank" rel="noopener" class="preview-og-card">' +
        (og.image ? '<div class="preview-og-image"><img src="' + esc(og.image) + '" alt="" /></div>' : '') +
        '<div class="preview-og-body">' +
          '<p class="preview-og-site">' + esc(og.siteName || '') + '</p>' +
          '<h3 class="preview-og-title">' + esc(og.title) + '</h3>' +
          (og.description ? '<p class="preview-og-desc">' + esc(og.description) + '</p>' : '') +
        '</div></a>';
    }

    // Convert markdown → HTML and replace bare-URL paragraphs with embeds
    function processBody(markdown) {
      if (!markdown) return '';

      var html = marked.parse(markdown, { gfm: true, breaks: false });

      // Match <p> that contains ONLY a single hyperlink (auto-linked by marked)
      html = html.replace(
        /<p>\s*<a\s+href="(https?:\/\/[^"]+)"[^>]*>[^<]+<\/a>\s*<\/p>/gi,
        function(match, url) {
          if (TWEET_RE.test(url)) return tweetEmbedHtml(url);
          return linkPlaceholderHtml(url);
        }
      );

      // Also match raw URL text (if marked didn't auto-link for some reason)
      html = html.replace(
        /<p>\s*(https?:\/\/[^\s<]+)\s*<\/p>/gi,
        function(match, url) {
          if (TWEET_RE.test(url)) return tweetEmbedHtml(url);
          return linkPlaceholderHtml(url);
        }
      );

      return html;
    }

    /* ── Post-render effects: Twitter widgets + OG fetch ──────────────────── */

    function usePreviewEffects(ref, bodyHtml) {
      useEffect(function() {
        if (!ref.current) return;

        // Re-run Twitter widget scan for any tweet blockquotes
        if (window.twttr && twttr.widgets) {
          twttr.widgets.load(ref.current);
        }

        // Fetch OG data for link card placeholders
        var placeholders = ref.current.querySelectorAll('.link-card-placeholder[data-url]:not([data-loaded])');
        placeholders.forEach(function(el) {
          var url = el.getAttribute('data-url');
          if (!url) return;
          el.setAttribute('data-loaded', '1');

          fetch('/.netlify/functions/og-proxy?url=' + encodeURIComponent(url))
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(og) {
              if (og && og.title) el.innerHTML = ogCardHtml(og);
            })
            .catch(function() {});
        });
      });
    }

    /* ── Gold badge helper ────────────────────────────────────────────────── */
    function GoldBadge(text) {
      return h('span', {
        style: {
          background: 'rgba(201,162,39,0.15)',
          color: '#c9a227',
          fontSize: '10px',
          fontWeight: '700',
          letterSpacing: '0.1em',
          textTransform: 'uppercase',
          padding: '3px 10px',
          borderRadius: '99px',
          border: '1px solid rgba(201,162,39,0.3)',
          display: 'inline-block',
        }
      }, text);
    }

    /* ── News Article Preview ─────────────────────────────────────────────── */
    function NewsPreview(props) {
      var entry = props.entry;
      var ref = useRef(null);

      var title    = entry.getIn(['data', 'title'])    || 'Untitled Article';
      var excerpt  = entry.getIn(['data', 'excerpt'])  || '';
      var body     = entry.getIn(['data', 'body'])     || '';
      var image    = entry.getIn(['data', 'image'])    || '';
      var author   = entry.getIn(['data', 'author'])   || 'BeefNews Staff';
      var category = entry.getIn(['data', 'category']) || '';
      var pubDate  = entry.getIn(['data', 'pubDate'])  || '';
      var featured = entry.getIn(['data', 'featured']) || false;
      var sponsored = entry.getIn(['data', 'sponsored']) || false;
      var sponsorName = entry.getIn(['data', 'sponsorName']) || '';

      var bodyHtml = processBody(body);

      usePreviewEffects(ref, bodyHtml);

      return h('div', { ref: ref, className: 'preview-wrapper' },

        // Hero image
        image && h('div', { style: { marginBottom: '1.5rem', borderRadius: '12px', overflow: 'hidden' } },
          h('img', { src: image, alt: title, style: { width: '100%', height: '320px', objectFit: 'cover', display: 'block' } })
        ),

        // Badges row
        h('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'center', marginBottom: '1rem' } },
          category && GoldBadge(category),
          featured && h('span', { style: {
            background: 'rgba(201,162,39,0.3)',
            color: '#c9a227',
            fontSize: '10px',
            fontWeight: '700',
            letterSpacing: '0.1em',
            textTransform: 'uppercase',
            padding: '3px 10px',
            borderRadius: '99px',
          }}, '★ Featured'),
          sponsored && h('span', { style: {
            background: 'rgba(113,113,122,0.2)',
            color: '#71717a',
            fontSize: '10px',
            fontWeight: '700',
            letterSpacing: '0.1em',
            textTransform: 'uppercase',
            padding: '3px 10px',
            borderRadius: '99px',
          }}, 'Sponsored' + (sponsorName ? ' · ' + sponsorName : ''))
        ),

        // Title
        h('h1', { style: {
          fontFamily: "'Space Grotesk', sans-serif",
          fontSize: '2rem',
          fontWeight: '700',
          color: '#fff',
          lineHeight: '1.2',
          marginBottom: '0.75rem',
          letterSpacing: '-0.02em',
        }}, title),

        // Byline
        h('p', { style: { color: '#71717a', fontSize: '13px', marginBottom: '1.5rem' }},
          author + (pubDate ? '  ·  ' + pubDate : '')
        ),

        // Excerpt
        excerpt && h('p', { style: {
          fontSize: '1.1rem',
          color: '#a1a1aa',
          lineHeight: '1.75',
          marginBottom: '2rem',
          paddingBottom: '2rem',
          borderBottom: '1px solid #27272a',
          fontStyle: 'italic',
        }}, excerpt),

        // Body
        h('div', {
          className: 'article-body',
          dangerouslySetInnerHTML: { __html: bodyHtml }
        })
      );
    }

    /* ── Radar Preview ────────────────────────────────────────────────────── */
    function RadarPreview(props) {
      var entry = props.entry;
      var ref = useRef(null);

      var title    = entry.getIn(['data', 'title'])    || 'Radar Item';
      var excerpt  = entry.getIn(['data', 'excerpt'])  || '';
      var body     = entry.getIn(['data', 'body'])     || '';
      var image    = entry.getIn(['data', 'image'])    || '';
      var category = entry.getIn(['data', 'category']) || 'Industry Radar';
      var extUrl   = entry.getIn(['data', 'externalUrl']) || '';

      var bodyHtml = processBody(body);
      usePreviewEffects(ref, bodyHtml);

      return h('div', { ref: ref, className: 'preview-wrapper' },
        h('div', { style: {
          background: '#141414',
          border: '1px solid #27272a',
          borderRadius: '12px',
          padding: '1.5rem',
          display: 'flex',
          gap: '1.25rem',
          alignItems: 'flex-start',
          marginBottom: '2rem',
        }},
          image && h('img', { src: image, alt: '', style: {
            width: '120px',
            height: '80px',
            objectFit: 'cover',
            borderRadius: '8px',
            flexShrink: '0',
          }}),
          h('div', {},
            GoldBadge(category),
            h('h2', { style: {
              fontFamily: "'Space Grotesk', sans-serif",
              fontSize: '1.25rem',
              fontWeight: '700',
              color: '#fff',
              marginTop: '10px',
              marginBottom: '8px',
              lineHeight: '1.3',
            }}, title),
            h('p', { style: { color: '#a1a1aa', fontSize: '0.9rem', lineHeight: '1.65', margin: '0' }}, excerpt),
            extUrl && h('a', { href: extUrl, target: '_blank', style: {
              display: 'inline-flex',
              alignItems: 'center',
              gap: '4px',
              marginTop: '10px',
              color: '#c9a227',
              fontSize: '12px',
              textDecoration: 'none',
            }}, 'Read more →')
          )
        ),
        body && h('div', {
          className: 'article-body',
          dangerouslySetInnerHTML: { __html: bodyHtml }
        })
      );
    }

    /* ── Authors Preview ──────────────────────────────────────────────────── */
    function AuthorPreview(props) {
      var entry = props.entry;
      var name    = entry.getIn(['data', 'name'])    || 'Author Name';
      var role    = entry.getIn(['data', 'role'])    || '';
      var bio     = entry.getIn(['data', 'bio'])     || '';
      var avatar  = entry.getIn(['data', 'avatar'])  || '';
      var twitter = entry.getIn(['data', 'twitter']) || '';
      var active  = entry.getIn(['data', 'active']);
      if (active === undefined) active = true;

      return h('div', { className: 'preview-wrapper' },
        h('div', { style: {
          display: 'flex',
          gap: '1.5rem',
          alignItems: 'center',
          marginBottom: '1.5rem',
        }},
          avatar
            ? h('img', { src: avatar, alt: name, style: {
                width: '80px',
                height: '80px',
                borderRadius: '50%',
                objectFit: 'cover',
                border: '2px solid #27272a',
              }})
            : h('div', { style: {
                width: '80px',
                height: '80px',
                borderRadius: '50%',
                background: '#1a1a1a',
                border: '2px solid #27272a',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '2rem',
                color: '#71717a',
              }}, '👤'),
          h('div', {},
            h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', marginBottom: '6px' }},
              h('h2', { style: {
                fontFamily: "'Space Grotesk', sans-serif",
                fontSize: '1.4rem',
                fontWeight: '700',
                color: '#fff',
                margin: '0',
              }}, name),
              !active && h('span', { style: {
                fontSize: '10px',
                color: '#71717a',
                border: '1px solid #27272a',
                padding: '2px 8px',
                borderRadius: '99px',
              }}, 'Inactive')
            ),
            role && h('p', { style: { color: '#c9a227', fontSize: '13px', margin: '0 0 4px', fontWeight: '600' }}, role),
            twitter && h('p', { style: { color: '#71717a', fontSize: '12px', margin: '0' }}, twitter)
          )
        ),
        bio && h('p', { style: { color: '#a1a1aa', lineHeight: '1.75', fontSize: '0.95rem' }}, bio)
      );
    }

    /* ── Register templates ───────────────────────────────────────────────── */
    CMS.registerPreviewTemplate('news', NewsPreview);
    CMS.registerPreviewTemplate('radar', RadarPreview);
    CMS.registerPreviewTemplate('authors', AuthorPreview);

    /* ── Identity redirect ────────────────────────────────────────────────── */
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
